name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - runner: windows-2019
            label: win2019
          - runner: windows-2022
            label: win2022
          - runner: windows-latest
            label: winlatest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt
      - name: Build executable
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --name sni-forwarder --add-data "config.json;." main.py
      - name: Pack artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/windows-${{ matrix.label }} | Out-Null
          Copy-Item dist/sni-forwarder.exe release/windows-${{ matrix.label }}/
          Copy-Item config.json release/windows-${{ matrix.label }}/
          Copy-Item README.md release/windows-${{ matrix.label }}/
          Copy-Item LICENSE release/windows-${{ matrix.label }}/
          Compress-Archive -Path release/windows-${{ matrix.label }}/* -DestinationPath release/sni-forwarder-windows-amd64-${{ matrix.label }}.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifact-${{ matrix.label }}
          path: release/sni-forwarder-windows-amd64-${{ matrix.label }}.zip

  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-20.04
            arch: amd64
            label: ubuntu2004-amd64
          - runner: ubuntu-22.04
            arch: amd64
            label: ubuntu2204-amd64
          - runner: ubuntu-24.04
            arch: amd64
            label: ubuntu2404-amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            label: ubuntu2404-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt
      - name: Build binary
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --name sni-forwarder --add-data "config.json:." main.py
          chmod +x dist/sni-forwarder
      - name: Pack artifact
        run: |
          mkdir -p release/linux-${{ matrix.label }}
          cp dist/sni-forwarder release/linux-${{ matrix.label }}/
          cp config.json release/linux-${{ matrix.label }}/
          cp README.md release/linux-${{ matrix.label }}/
          cp LICENSE release/linux-${{ matrix.label }}/
          tar -czf release/sni-forwarder-linux-${{ matrix.label }}.tar.gz -C release/linux-${{ matrix.label }} .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifact-${{ matrix.label }}
          path: release/sni-forwarder-linux-${{ matrix.label }}.tar.gz

  build-deb:
    strategy:
      matrix:
        include:
          - runner: ubuntu-20.04
            arch: amd64
            label: ubuntu2004-amd64
          - runner: ubuntu-22.04
            arch: amd64
            label: ubuntu2204-amd64
          - runner: ubuntu-24.04
            arch: amd64
            label: ubuntu2404-amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            label: ubuntu2404-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements-build.txt
      - name: Build linux binary
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --name sni-forwarder --add-data "config.json:." main.py
          chmod +x dist/sni-forwarder
      - name: Build deb package
        run: |
          chmod +x scripts/build_deb.sh
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.arch }}" bash scripts/build_deb.sh "$VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: deb-artifact-${{ matrix.label }}
          path: dist/deb/*.deb

  release:
    needs: [build-windows, build-linux, build-deb]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows-artifact-win2019/sni-forwarder-windows-amd64-win2019.zip
            release-assets/windows-artifact-win2022/sni-forwarder-windows-amd64-win2022.zip
            release-assets/windows-artifact-winlatest/sni-forwarder-windows-amd64-winlatest.zip
            release-assets/linux-artifact-ubuntu2004-amd64/sni-forwarder-linux-ubuntu2004-amd64.tar.gz
            release-assets/linux-artifact-ubuntu2204-amd64/sni-forwarder-linux-ubuntu2204-amd64.tar.gz
            release-assets/linux-artifact-ubuntu2404-amd64/sni-forwarder-linux-ubuntu2404-amd64.tar.gz
            release-assets/linux-artifact-ubuntu2404-arm64/sni-forwarder-linux-ubuntu2404-arm64.tar.gz
            release-assets/deb-artifact-ubuntu2004-amd64/*.deb
            release-assets/deb-artifact-ubuntu2204-amd64/*.deb
            release-assets/deb-artifact-ubuntu2404-amd64/*.deb
            release-assets/deb-artifact-ubuntu2404-arm64/*.deb
